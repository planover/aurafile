name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write      # 创建 GitHub Release
  packages: write      # 推送镜像到 ghcr.io

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/planover/aurafile:latest \
            -t ghcr.io/planover/aurafile:${{ steps.ver.outputs.version }} .

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/planover/aurafile:latest
          docker push ghcr.io/planover/aurafile:${{ steps.ver.outputs.version }}

      - name: Sync manifest version to tag
        # fpk INI manifest 的 version 字段随 tag 自动同步（不再使用旧的 JSON fpk.json）
        run: sed -i "s/^version=.*/version=${{ steps.ver.outputs.version }}/" fpk/manifest

      - name: Package fpk (tar.gz format per fnOS spec)
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OUT="aurafile-${VERSION}.fpk"
          built=""
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.2.3-linux-amd64"
          # 优先使用官方 fnpack 打包标准 .fpk（fnpack 内部也是 tar.gz）
          if curl -fsSL --connect-timeout 10 --max-time 30 "$FNPACK_URL" -o fnpack 2>/dev/null; then
            chmod +x fnpack
            ./fnpack build --directory fpk || true
            built=$(find . -maxdepth 2 -name '*.fpk' 2>/dev/null | grep -v "$OUT" | head -n1 || true)
            if [ -n "$built" ]; then
              mv "$built" "$OUT"
            fi
          fi
          # ⚠️ 兜底：若 fnpack 不可达，用 tar.gz 手动打包
          #    fnOS 的 .fpk 本质是 tar.gz（参考 conversun/fnos-apps build-fpk.sh）
          #    绝不能用 zip —— fnOS 不认 zip 格式的 fpk！
          if [ ! -f "$OUT" ]; then
            echo "⚠️ fnpack 未获取，使用 tar.gz 等价打包（fpk = tar.gz 格式，非 zip）"
            ( cd fpk && tar -czf "../$OUT" * )
          fi
          ls -la "$OUT"
          echo "fpk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          cat > latest.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "name": "Aurafile",
            "fpk": "aurafile-${{ steps.ver.outputs.version }}.fpk",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "notes": "https://github.com/planover/aurafile/releases/tag/${{ github.ref_name }}"
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aurafile-${{ steps.ver.outputs.version }}.fpk
            latest.json
          name: Aurafile ${{ steps.ver.outputs.version }}
          body: |
            Aurafile v${{ steps.ver.outputs.version }} — 梦幻柔和的离线 NAS 文件管理器
            （fnOS fpk · 仅 X86 / amd64 · 镜像从 ghcr.io/planover/aurafile:latest 拉取，fpk 不内嵌镜像）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
