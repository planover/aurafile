<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光匣 Aurafile · 梦幻文件管理器</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- 完全离线：无任何外部字体/CDN/遥测请求 -->
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-aura"></span>
        <span class="brand-name">光匣</span>
      </div>

      <div class="searchbox">
        <input id="searchInput" type="search" placeholder="搜索文件名或文件内容…" autocomplete="off" />
        <button id="filterBtn" class="icon-btn" title="筛选">⚙</button>
      </div>

      <div class="top-actions">
        <button id="undoBtn" class="icon-btn" title="撤销 (Ctrl+Z)">↶</button>
        <button id="redoBtn" class="icon-btn" title="重做 (Ctrl+Y)">↷</button>
        <button id="aboutBtn" class="icon-btn" title="关于">ℹ</button>
      </div>
    </header>

    <section class="toolbar" id="toolbar" hidden>
      <span id="selCount" class="sel-count">已选 0 项</span>
      <button data-act="rename">重命名</button>
      <button data-act="copy">复制</button>
      <button data-act="cut">剪切</button>
      <button data-act="paste">粘贴</button>
      <button data-act="trash" class="danger">删除至回收站</button>
      <button data-act="delete" class="danger-strong">彻底删除</button>
      <button data-act="archive">压缩</button>
      <button data-act="extract">解压</button>
      <button data-act="convert">转换</button>
      <button data-act="details">详情</button>
    </section>

    <main id="timeline" class="timeline"></main>

    <aside id="detail" class="detail-panel" hidden>
      <button class="detail-close" id="detailClose">×</button>
      <div id="detailBody"></div>
    </aside>

    <div id="toast" class="toast" hidden></div>

    <!-- 筛选弹层 -->
    <div id="filterModal" class="modal" hidden>
      <div class="modal-card">
        <h3>筛选</h3>
        <label>类型
          <select id="fType">
            <option value="all">全部</option>
            <option value="image">图片</option>
            <option value="video">视频</option>
            <option value="doc">文档</option>
            <option value="audio">音频</option>
            <option value="archive">压缩包</option>
            <option value="other">其他</option>
          </select>
        </label>
        <label>最小大小 (MB)<input id="fMin" type="number" min="0" step="1" /></label>
        <label>最大大小 (MB)<input id="fMax" type="number" min="0" step="1" /></label>
        <label>起始日期<input id="fFrom" type="date" /></label>
        <label>结束日期<input id="fTo" type="date" /></label>
        <div class="modal-actions">
          <button id="filterApply" type="button">应用</button>
          <button id="filterReset" type="button" class="ghost">重置</button>
        </div>
      </div>
    </div>

    <!-- 已废弃：promptModal 弹窗。v0.1.12 起改用内联重命名 + 内联输入条（兼容 fnOS iframe） -->

    <!-- 已改为独立 /about 页面，不再使用弹窗 -->
  </div>

  <script src="/app.js"></script>
</body>
</html>
