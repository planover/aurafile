<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光匣 Aurafile · 梦幻文件管理器</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-aura"></span>
        <span class="brand-name">光匣</span>
      </div>

      <div class="searchbox">
        <input id="searchInput" type="search" placeholder="搜索文件名或文件内容…" autocomplete="off" />
        <button id="filterBtn" class="icon-btn" title="筛选（展开/收起）">⚙</button>
      </div>

      <div class="top-actions">
        <button id="browseBtn" class="icon-btn" title="浏览目录（按路径查看所有文件）">📁</button>
        <button id="undoBtn" class="icon-btn" title="撤销 (Ctrl+Z)">↶</button>
        <button id="redoBtn" class="icon-btn" title="重做 (Ctrl+Y)">↷</button>
        <button id="aboutBtn" class="icon-btn" title="关于">ℹ</button>
      </div>
    </header>

    <!-- ★ 浏览模式：面包屑路径栏（替代无限时间轴，直接看全部文件）★ -->
    <div id="pathbar" class="pathbar" hidden>
      <span class="pathbar-label">浏览：</span>
      <span id="pathCrumbs"></span>
    </div>
    <div id="stats" class="stats"></div>

    <!-- ★ 内联筛选栏（替代 filterModal，零 modal，纯文档流）★ -->
    <div id="filterBar" class="filter-bar">
      <div class="filter-row">
        <label class="filter-label">类型
          <select id="fType">
            <option value="all">全部</option>
            <option value="image">图片</option>
            <option value="video">视频</option>
            <option value="doc">文档</option>
            <option value="audio">音频</option>
            <option value="archive">压缩包</option>
            <option value="other">其他</option>
          </select>
        </label>
        <label class="filter-label">最小大小 (MB)
          <input id="fMin" type="number" min="0" step="1" />
        </label>
        <label class="filter-label">最大大小 (MB)
          <input id="fMax" type="number" min="0" step="1" />
        </label>
      </div>
      <div class="filter-row">
        <label class="filter-label">起始日期
          <input id="fFrom" type="date" />
        </label>
        <label class="filter-label">结束日期
          <input id="fTo" type="date" />
        </label>
        <div class="filter-actions">
          <button id="filterApplyBtn" type="button" class="inline-btn primary">应用</button>
          <button id="filterResetBtn" type="button" class="inline-btn ghost">重置</button>
          <button id="filterCloseBtn" class="inline-bar-close">×</button>
        </div>
      </div>
    </div>

    <section class="toolbar" id="toolbar" hidden>
      <span id="selCount" class="sel-count">已选 0 项</span>
      <button data-act="rename">重命名</button>
      <button data-act="copy">复制</button>
      <button data-act="cut">剪切</button>
      <button data-act="paste">粘贴</button>
      <button data-act="trash" class="danger">删除至回收站</button>
      <button data-act="delete" class="danger-strong">彻底删除</button>
      <button data-act="archive">压缩</button>
      <button data-act="extract">解压</button>
      <button data-act="convert">转换</button>
      <button data-act="details">详情</button>
    </section>

    <main id="timeline" class="timeline"></main>
    <main id="browser" class="browser" hidden></main>

    <aside id="detail" class="detail-panel" hidden>
      <button class="detail-close" id="detailClose">×</button>
      <div id="detailBody"></div>
    </aside>

    <div id="toast" class="toast" hidden></div>

    <!-- v0.1.13: 零 modal。所有交互均为内联/文档流内完成 -->
  </div>

  <script src="/app.js"></script>
</body>
</html>
