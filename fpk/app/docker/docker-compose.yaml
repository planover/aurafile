services:
  aurafile:
    image: ghcr.io/planover/aurafile:latest
    container_name: aurafile
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8011:8011/tcp"
    volumes:
      - /data:/data
      - /config/aurafile:/config/aurafile
    environment:
      - AURAFILE_ROOT=/data
      - AURAFILE_DATA=/config/aurafile
      - PORT=8011
